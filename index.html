<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bierkultur GV 2026</title>
    <style>
        :root { --gold: #ffcc00; --dark: #1a1a1a; --grey: #333; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--dark); color: white; text-align: center; margin: 0; padding: 15px; }
        .card { max-width: 420px; margin: auto; background: var(--grey); padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #444; }
        
        /* Stylisches CSS Bierglas */
        .beer-icon { width: 35px; height: 45px; background: var(--gold); margin: 0 auto 15px; border-radius: 0 0 5px 5px; position: relative; border: 3px solid white; }
        .beer-foam { width: 42px; height: 12px; background: white; border-radius: 10px; position: absolute; top: -8px; left: -4px; }
        .beer-handle { width: 12px; height: 22px; border: 3px solid white; border-left: none; position: absolute; right: -15px; top: 8px; border-radius: 0 10px 10px 0; }

        h2 { color: var(--gold); margin: 0 0 5px 0; font-size: 1.2rem; letter-spacing: 2px; }
        .sub { font-size: 0.7rem; opacity: 0.6; margin-bottom: 20px; text-transform: uppercase; }

        input, button, select { width: 100%; padding: 16px; margin: 10px 0; border-radius: 12px; border: none; font-size: 16px; outline: none; transition: 0.2s; }
        input { background: #444; color: white; border: 1px solid #555; }
        input::placeholder { color: #888; }
        
        button { background: var(--gold); color: black; font-weight: bold; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        button:active { transform: scale(0.96); opacity: 0.9; }
        
        .btn-host { background: #3498db; color: white; margin-top: 20px; }
        .btn-danger { background: #e74c3c; color: white; font-size: 0.8rem; padding: 10px; }
        
        #qDisplay { font-size: 1.5rem; color: var(--gold); margin: 25px 0; font-weight: 800; line-height: 1.3; min-height: 2em; }
        
        .score-list { text-align: left; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 12px; margin-top: 30px; }
        .score-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #444; }
        .score-item:last-child { border: none; }

        .vote-btn { background: #222; color: white; border: 1px solid var(--gold); margin-bottom: 10px; text-align: left; padding: 12px; }
    </style>
</head>
<body>

<div class="card">
    <div class="beer-icon"><div class="beer-foam"></div><div class="beer-handle"></div></div>
    <h2>BIERKULTUR</h2>
    <div class="sub">GV Brittnau • 21.03.2026</div>

    <div id="sectionLogin">
        <input type="text" id="nameInp" placeholder="Dein Name">
        <input type="text" id="roomInp" placeholder="Raum Code (GV26)">
        <select id="modeSel">
            <option value="game1">Smalltalk-Fail</option>
            <option value="game2">Wer würde eher?</option>
            <option value="game3">Bier-Lexikon</option>
        </select>
        <button id="btnPlayer">BEITRETEN</button>
        <button id="btnHost" class="btn-host">ALS HOST STARTEN</button>
    </div>

    <div id="sectionGame" style="display:none">
        <div id="hostControls" style="display:none; background: #222; padding: 15px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #444;">
            <button id="btnNext">NÄCHSTE FRAGE</button>
            <button id="btnVote" style="background: white;">VOTING STARTEN</button>
            <button id="btnReset" class="btn-danger">SPIEL ZURÜCKSETZEN</button>
        </div>

        <div id="qDisplay">Warte auf Host...</div>

        <div id="inputArea">
            <input type="text" id="ansInp" placeholder="Deine Antwort...">
            <button id="btnSend">ABSENDEN</button>
        </div>
        <div id="waitMsg" style="display:none; color: var(--gold); padding: 20px; font-weight: bold;">
            ✅ Antwort gesendet!
        </div>

        <div id="voteArea" style="display:none">
            <div id="voteList"></div>
        </div>

        <div class="score-list">
            <div style="font-weight: bold; color: var(--gold); margin-bottom: 10px; font-size: 0.8rem;">RANGLISTE</div>
            <div id="scoreDisplay"></div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, update, get, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCH5KfFTwISrjvXQQiX9GBw9AFhB1Ihos4",
        authDomain: "bierkultur-d2fea.firebaseapp.com",
        databaseURL: "https://bierkultur-d2fea-default-rtdb.europe-west1.firebasedatabase.app/",
        projectId: "bierkultur-d2fea",
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const quiz = {
        game1: ["Meistgeklautes Hotel-Objekt?", "Dümmste Büro-Ausrede?", "Bier-Fail Story?", "Schlimmster Anmachspruch?"],
        game2: ["Wer trinkt am schnellsten?", "Wer vergisst immer seinen Geldbeutel?", "Wer landet zuerst im Brunnen?", "Wer ruft nachts den Ex an?"],
        game3: ["Was bedeutet IPA wirklich?", "Zutat für Brittnauer Spezialbier?", "Bier-Mischgetränk des Grauens?"]
    };

    let user, room, isH = false, lastIdx = -1;

    async function start(h) {
        user = document.getElementById('nameInp').value.trim();
        const rInput = document.getElementById('roomInp').value.trim().toUpperCase();
        
        if(!user) return alert("Wie heißt du?");
        if(rInput !== "GV26") return alert("Falscher Raum-Code!");
        room = rInput;

        const stateRef = ref(db, `rooms/${room}/state`);
        const snap = await get(stateRef);

        if(h) {
            if(snap.exists() && snap.val().host && snap.val().host !== user) {
                return alert("Es gibt bereits einen aktiven Host!");
            }
            await update(stateRef, { host: user, mode: document.getElementById('modeSel').value, phase: 'answer', qIdx: 0 });
            isH = true;
        }
        
        await update(ref(db, `rooms/${room}/players`), { [user]: 0 });
        document.getElementById('sectionLogin').style.display = 'none';
        document.getElementById('sectionGame').style.display = 'block';
        if(isH) document.getElementById('hostControls').style.display = 'block';

        initSync();
    }

    function initSync() {
        onValue(ref(db, `rooms/${room}/state`), snap => {
            const d = snap.val();
            if(!d) {
                // Wenn der Host löscht, alle zurück zum Login
                location.reload();
                return;
            }

            document.getElementById('qDisplay').innerText = quiz[d.mode][d.qIdx % quiz[d.mode].length];

            if(d.qIdx !== lastIdx) {
                lastIdx = d.qIdx;
                document.getElementById('inputArea').style.display = 'block';
                document.getElementById('waitMsg').style.display = 'none';
                document.getElementById('voteArea').style.display = 'none';
                document.getElementById('ansInp').value = "";
                document.getElementById('voteList').innerHTML = "";
            }

            if(d.phase === 'vote') {
                document.getElementById('inputArea').style.display = 'none';
                document.getElementById('waitMsg').style.display = 'none';
                document.getElementById('voteArea').style.display = 'block';
                loadVotes();
            }
        });

        onValue(ref(db, `rooms/${room}/players`), snap => {
            const p = snap.val() || {};
            document.getElementById('scoreDisplay').innerHTML = Object.entries(p)
                .sort((a,b)=>b[1]-a[1]).map(([n,s])=>`<div class="score-item"><span>${n}</span><span>${s} Pkt</span></div>`).join("");
        });
    }

    // BUTTON EVENTS
    document.getElementById('btnHost').onclick = () => start(true);
    document.getElementById('btnPlayer').onclick = () => start(false);

    document.getElementById('btnSend').onclick = () => {
        const txt = document.getElementById('ansInp').value.trim();
        if(!txt) return;
        set(ref(db, `rooms/${room}/answers/${user}`), txt);
        document.getElementById('inputArea').style.display = 'none';
        document.getElementById('waitMsg').style.display = 'block';
    };

    document.getElementById('btnNext').onclick = async () => {
        const s = await get(ref(db, `rooms/${room}/state`));
        const n = (s.val().qIdx || 0) + 1;
        await set(ref(db, `rooms/${room}/answers`), {});
        await update(ref(db, `rooms/${room}/state`), { phase: 'answer', qIdx: n });
    };

    document.getElementById('btnVote').onclick = () => {
        update(ref(db, `rooms/${room}/state`), { phase: 'vote' });
    };

    document.getElementById('btnReset').onclick = async () => {
        if(confirm("Wirklich alles löschen und neu starten?")) {
            await remove(ref(db, `rooms/${room}`));
            location.reload();
        }
    };

    async function loadVotes() {
        const list = document.getElementById('voteList');
        if(list.innerHTML !== "") return;
        const snap = await get(ref(db, `rooms/${room}/answers`));
        const ans = snap.val() || {};
        Object.entries(ans).forEach(([name, text]) => {
            if(name === user) return;
            const b = document.createElement('button');
            b.className = "vote-btn";
            b.innerText = text;
            b.onclick = async () => {
                list.innerHTML = "<p style='color:var(--gold)'>✅ Stimme gezählt!</p>";
                const pRef = ref(db, `rooms/${room}/players/${name}`);
                const pSnap = await get(pRef);
                update(ref(db, `rooms/${room}/players`), { [name]: (pSnap.val() || 0) + 1 });
            };
            list.appendChild(b);
        });
        if(list.innerHTML === "") list.innerHTML = "Keine Antworten vorhanden.";
    }
</script>
</body>
</html>
