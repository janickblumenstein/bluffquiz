<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bierkultur GV 2026</title>
    <style>
        :root { --gold: #ffcc00; --dark: #1a1a1a; }
        body { font-family: sans-serif; background: var(--dark); color: white; text-align: center; padding: 10px; margin: 0; }
        .container { max-width: 400px; margin: auto; background: #333; padding: 20px; border-radius: 15px; }
        
        /* CSS Logo als Ersatz für das fehlerhafte Bild */
        .logo-fallback { 
            width: 80px; height: 80px; background: var(--gold); color: black; 
            border-radius: 50%; margin: 0 auto 10px; display: flex; 
            align-items: center; justify-content: center; font-weight: bold; font-size: 2rem;
        }

        .hidden { display: none !important; }
        input, select, button { width: 100%; padding: 15px; margin: 10px 0; border-radius: 8px; border: none; font-size: 1rem; }
        button { background: var(--gold); font-weight: bold; cursor: pointer; }
        .btn-host { background: #3498db; color: white; }
        #questionDisplay { font-size: 1.4rem; color: var(--gold); margin: 20px 0; font-weight: bold; }
        .score-box { background: #222; padding: 10px; margin-top: 20px; text-align: left; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="container">
    <img src="https://bierkultur.beer/wp-content/uploads/2025/11/BK_Logo_Round_Thick.svg" class="logo">
    <div style="color:var(--gold); font-size: 0.8rem; margin-bottom: 20px;">BIERKULTUR BRITTNAU</div>

    <!-- LOGIN -->
    <div id="divLogin">
        <input type="text" id="inpName" placeholder="Dein Name">
        <input type="text" id="inpRoom" placeholder="Raum Code">
        <select id="selMode">
            <option value="game1">Smalltalk-Fail</option>
            <option value="game2">Wer würde eher?</option>
        </select>
        <button id="btnJoinHost" class="btn-host">HOST STARTEN</button>
        <button id="btnJoinPlayer">BEITRETEN</button>
    </div>

    <!-- GAME -->
    <div id="divGame" class="hidden">
        <div id="divHostControls" class="hidden">
            <button id="btnNextQ">NÄCHSTE FRAGE</button>
            <button id="btnShowVote" style="background:white">VOTING STARTEN</button>
        </div>

        <div id="questionDisplay">Warte...</div>

        <!-- DAS EINGABEFELD -->
        <div id="divInput">
            <input type="text" id="inpAns" placeholder="Deine Antwort...">
            <button id="btnSendAns">ABSENDEN</button>
        </div>

        <div id="divWait" class="hidden">✅ Gesendet! Warten...</div>

        <!-- VOTING -->
        <div id="divVote" class="hidden">
            <p>Wähle den besten Text:</p>
            <div id="voteList"></div>
        </div>

        <div class="score-box">
            <strong>Punkte:</strong>
            <div id="divScores"></div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCH5KfFTwISrjvXQQiX9GBw9AFhB1Ihos4",
        authDomain: "bierkultur-d2fea.firebaseapp.com",
        databaseURL: "https://bierkultur-d2fea-default-rtdb.europe-west1.firebasedatabase.app/",
        projectId: "bierkultur-d2fea",
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const questions = {
        game1: ["Bier-Fail des Jahres?", "Büro-Ausrede?", "Hotel-Diebstahl?"],
        game2: ["Wer trinkt am meisten?", "Wer singt am schlechtesten?"]
    };

    let uName, uRoom, isHost = false, currentQ = -1;

    // JOIN
    async function join(h) {
        uName = document.getElementById('inpName').value.trim();
        uRoom = document.getElementById('inpRoom').value.trim().toUpperCase();
        if(!uName || !uRoom) return alert("Name/Raum?");

        isHost = h;
        if(isHost) {
            await set(ref(db, `rooms/${uRoom}/state`), { 
                host: uName, mode: document.getElementById('selMode').value, phase: 'answer', qIdx: 0 
            });
        }
        
        await update(ref(db, `rooms/${uRoom}/players`), { [uName]: 0 });
        document.getElementById('divLogin').classList.add('hidden');
        document.getElementById('divGame').classList.remove('hidden');
        if(isHost) document.getElementById('divHostControls').classList.remove('hidden');

        sync();
    }

    document.getElementById('btnJoinHost').onclick = () => join(true);
    document.getElementById('btnJoinPlayer').onclick = () => join(false);

    // SYNC
    function sync() {
        onValue(ref(db, `rooms/${uRoom}/state`), snap => {
            const data = snap.val();
            if(!data) return;

            // Neue Frage -> Eingabe zeigen
            if(data.qIdx !== currentQ) {
                currentQ = data.qIdx;
                document.getElementById('divInput').classList.remove('hidden');
                document.getElementById('divWait').classList.add('hidden');
                document.getElementById('inpAns').value = "";
                document.getElementById('voteList').innerHTML = "";
            }

            if(data.phase === 'answer') {
    document.getElementById('questionDisplay').innerText = questions[data.mode][data.qIdx % questions[data.mode].length];

    // WICHTIG: UI sauber zurücksetzen für ALLE
    document.getElementById('divInput').classList.remove('hidden');
    document.getElementById('divWait').classList.add('hidden');
    document.getElementById('divVote').classList.add('hidden');

    document.getElementById('inpAns').value = "";
    document.getElementById('voteList').innerHTML = "";
}

            } else if(data.phase === 'vote') {
                document.getElementById('divInput').classList.add('hidden');
                document.getElementById('divWait').classList.add('hidden');
                document.getElementById('divVote').classList.remove('hidden');
                showVotes();
            }
        });

        onValue(ref(db, `rooms/${uRoom}/players`), snap => {
            const p = snap.val() || {};
            document.getElementById('divScores').innerHTML = Object.entries(p)
                .map(([n,s]) => `<div>${n}: ${s}</div>`).join("");
        });
    }

    // ACTIONS
    document.getElementById('btnSendAns').onclick = () => {
        const val = document.getElementById('inpAns').value.trim();
        if(!val) return;
        set(ref(db, `rooms/${uRoom}/answers/${uName}`), val);
        document.getElementById('divInput').classList.add('hidden');
        document.getElementById('divWait').classList.remove('hidden');
    };

    document.getElementById('btnNextQ').onclick = async () => {
        const snap = await get(ref(db, `rooms/${uRoom}/state`));
        const next = (snap.val().qIdx || 0) + 1;
        await set(ref(db, `rooms/${uRoom}/answers`), {});
        await update(ref(db, `rooms/${uRoom}/state`), { phase: 'answer', qIdx: next });
    };

    document.getElementById('btnShowVote').onclick = () => {
        update(ref(db, `rooms/${uRoom}/state`), { phase: 'vote' });
    };

    async function showVotes() {
        const container = document.getElementById('voteList');
        if(container.innerHTML !== "") return;
        const snap = await get(ref(db, `rooms/${uRoom}/answers`));
        const ans = snap.val() || {};
        Object.entries(ans).forEach(([name, text]) => {
            if(name === uName) return;
            const b = document.createElement('button');
            b.innerText = text;
            b.style.marginBottom = "5px";
            b.onclick = async () => {
                container.innerHTML = "Danke!";
                const pRef = ref(db, `rooms/${uRoom}/players/${name}`);
                const pSnap = await get(pRef);
                update(ref(db, `rooms/${uRoom}/players`), { [name]: (pSnap.val() || 0) + 1 });
            };
            container.appendChild(b);
        });
    }
</script>
</body>
</html>
