<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bierkultur GV 2026</title>
    <style>
        :root { --gold:#ffcc00; --dark:#1a1a1a; --grey:#333; --blue: #3498db; --green: #2ecc71; }
        body { font-family:sans-serif; background:var(--dark); color:white; text-align:center; margin:0; padding:10px; overflow-x: hidden; }
        .card { max-width:420px; margin:auto; background:var(--grey); padding:20px; border-radius:15px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); position: relative; }
        input, button, select { width:100%; padding:15px; margin:8px 0; border-radius:10px; border:none; font-size:16px; box-sizing: border-box; transition: 0.2s; }
        button { background:var(--gold); font-weight:bold; cursor:pointer; }
        button:active { transform: scale(0.98); }
        select { background: white; color: black; height: 50px; }
        .btn-host { background:var(--blue); color:white; }
        .btn-score { background:var(--green); color:white; }
        .btn-event { background:#9b59b6; color:white; }
        .btn-danger { background:#e74c3c; color:white; font-size: 0.8rem; }
        
        #qDisplay { font-size:1.4rem; color:var(--gold); margin:20px 0; font-weight:bold; min-height: 50px; }
        #waitMsg { color: #e74c3c; font-weight: bold; margin: 10px 0; font-size: 1.2rem; }
        #resultBanner { background: rgba(46, 204, 113, 0.2); border: 2px solid var(--green); padding: 10px; border-radius: 10px; margin-bottom: 15px; display: none; }
        
        .score-item { 
            display:flex; justify-content:space-between; align-items: center;
            background: rgba(255,255,255,0.05); margin: 5px 0; padding:12px; border-radius: 8px;
            animation: slideIn 0.4s ease-out forwards; opacity: 0;
        }
        @keyframes slideIn { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .plus-one { color: var(--green); font-weight: bold; margin-left: 10px; animation: bounce 1s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        
        .rank-1 { border: 2px solid var(--gold); background: rgba(255, 204, 0, 0.1); }
        .live-item { display: flex; justify-content: space-between; padding: 4px 0; opacity: 0.7; font-size: 0.85rem; }
        .vote-btn { background:#222; color:white; border:1px solid var(--gold); margin:5px 0; padding:12px; text-align:left; }
        
        #eventOverlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:9999; display:none; flex-direction:column; align-items:center; justify-content:center; padding: 20px; }
        .beer-spin { font-size:5rem; animation:spin 2s infinite linear; }
        @keyframes spin {100% {transform:rotate(360deg);}}
    </style>
</head>
<body>

<div class="card">
    <h2 id="mainTitle">🍺 BIERKULTUR GV26</h2>
    <div id="loginSection">
        <input id="nameInp" placeholder="Dein Name">
        <input id="roomInp" placeholder="Code (GV26)">
        <button id="btnPlayer">Beitreten</button>
        <button id="btnHost" class="btn-host">Als Host starten</button>
    </div>

    <div id="gameSection" style="display:none">
        <div id="hostControls" style="display:none; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 10px; margin-bottom: 15px;">
            <button id="btnNext">Nächste Frage</button>
            <button id="btnVote">Auswerten / Voting</button>
            <button id="btnScore" class="btn-score">🏆 Rangliste</button>
            <button id="btnEvent" class="btn-event">🎲 TRINK-EVENT</button>
            <button id="btnReset" class="btn-danger">Reset</button>
        </div>

        <div id="resultBanner"></div>
        <div id="qDisplay">Warten...</div>
        <div id="waitMsg"></div>

        <div id="inputArea" style="display:none">
            <div id="dynamicInput"></div>
            <button id="btnSend">Senden</button>
        </div>
        <div id="voteArea" style="display:none"></div>
        <div id="bigScoreArea" style="display:none"></div>

        <div id="liveScore" style="margin-top:20px; border-top:1px solid #444; padding-top:10px;">
            <div id="liveScoreList"></div>
        </div>
    </div>
</div>

<div id="eventOverlay">
    <div class="beer-spin">🍻</div>
    <div id="eventText" style="font-size:2rem; color:var(--gold); font-weight:bold; margin:20px; text-align:center;"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, onValue, update, get, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSy...", 
    authDomain: "bierkultur-d2fea.firebaseapp.com",
    databaseURL: "https://bierkultur-d2fea-default-rtdb.europe-west1.firebasedatabase.app/",
    projectId: "bierkultur-d2fea"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const baseQuestions = [
    "Wer eskaliert heute als Erster?", "Neue Funktion bei WhatsApp:", "Wer bringt am meisten Chaos auf Partys?",
    "Wer wird neuer Präsident?", "Was steht auf deinem Grabstein?", "Wer vergisst ständig Geburtstage?",
    "Wer hat die schönste Frau?", "Wer hat die peinlichsten Fotos?", "Neuer Tinder Premium Vorteil:",
    "Was passiert nach der GV wirklich?", "Wer macht die Finanzkontrolle?", "Wofür steht IKEA?",
    "Was sagt man nach richtig schlechtem Sex?", "Definiere: Bier-Notfall", "Welches Mitglied hat die schwächste Blase?",
    "Wer würde im Urlaub am meisten übertreiben?", "Wer kann am schlechtesten lügen?", "Wer wird als Nächstes heiraten?",
    "Was ist der wahre Grund deiner Teilnahme?", "Wer hat keinen Rollkoffer?", "Wer hat den tollsten Schnauzer?",
    "Ein Dampfschiff ist weniger schwer als:", "Bierkultur Zofingen wird in 10 Jahren:", "Wer wird am ehesten Grosspapa?",
    "Wer würde im Notfall am schnellsten wegrennen?", "Wer wird als Nächstes Millionär?", "Wer verschläft am häufigsten?",
    "Wer hat die schlimmsten Jugendsünden?","Wer von uns hilt am meisten im Verein mit?","Wer von uns hat am meisten von unserem Bier gekauft?"
];

const drinkRules = ["ALLE TRINKEN! 🍻", "Host verteilt 3 Schlucke!", "Brillenträger trinken!", "Letzter trinkt!","ELITEN-TRINKEN! 👑 Die Top 3 trinken","PROST PRÄSIDENT! Alle trinken auf den Präsi"];

let user, room, isH = false, lastEventTs = 0, timerInt = null, joinTime = Date.now(), currentPlayers = [];

async function start(hostMode) {
    user = nameInp.value.trim();
    room = roomInp.value.trim().toUpperCase();
    if(!user || room !== "GV26") return alert("Name/Code falsch!");
    joinTime = Date.now();
    if(hostMode) {
        isH = true;
        await remove(ref(db, `rooms/${room}`));
        await update(ref(db, `rooms/${room}/state`), { host: user, phase: "lobby", qIdx: -1, gameQs: baseQuestions.sort(() => Math.random() - 0.5) });
    }
    const pRef = ref(db, `rooms/${room}/players/${user}`);
    if(!(await get(pRef)).exists()) await set(pRef, 0);
    loginSection.style.display = "none";
    gameSection.style.display = "block";
    if(isH) hostControls.style.display = "block";
    sync();
}

function sync() {
    onValue(ref(db, `rooms/${room}/state`), async snap => {
        const d = snap.val(); if(!d) return;
        
        // UI Reset (außer Event-Overlay)
        inputArea.style.display = "none";
        voteArea.style.display = "none";
        bigScoreArea.style.display = "none";
        resultBanner.style.display = "none";
        liveScore.style.display = (d.phase === "score") ? "none" : "block";

        if(d.phase === "lobby") qDisplay.innerText = "Warten auf Host...";
        else if(d.phase === "answer") {
            qDisplay.innerText = d.gameQs[d.qIdx];
            if (!waitMsg.innerText.includes("✅")) { setupInput(d.gameQs[d.qIdx]); inputArea.style.display = "block"; }
        } 
        else if(d.phase === "vote") {
            qDisplay.innerText = "Abstimmung!";
            voteArea.style.display = "block";
            loadVotes();
        }
        else if(d.phase === "score") {
            qDisplay.innerText = "🏆 Rangliste";
            bigScoreArea.style.display = "block";
            waitMsg.innerText = "";
            showResultBanner(d.lastResult);
            loadBigScores(d.lastResult);
        }

        // Timer Logic
        if(timerInt) clearInterval(timerInt);
        if(d.phase === "answer" && d.endTime) {
            timerInt = setInterval(async () => {
                const diff = Math.ceil((d.endTime - Date.now()) / 1000);
                if(diff <= 0) { 
                    clearInterval(timerInt); 
                    waitMsg.innerText = "⏱️ Zeit um!"; 
                    inputArea.style.display = "none";
                    if(isH) {
                        const q = d.gameQs[d.qIdx];
                        if(q.trim().toLowerCase().startsWith("wer")) {
                            await evaluateVote(true);
                            setTimeout(() => { update(ref(db, `rooms/${room}/state`), { phase: "score" }); }, 1000);
                        } else {
                            update(ref(db, `rooms/${room}/state`), { phase: "vote" });
                        }
                    }
                } else { waitMsg.innerText = "⏳ " + diff + "s"; }
            }, 1000);
        }

        // Trink-Event Logic (unabhängig von Phase)
        if(d.event && d.event.ts > joinTime && d.event.ts !== lastEventTs) {
            lastEventTs = d.event.ts;
            eventText.innerText = d.event.text;
            eventOverlay.style.display = "flex";
            setTimeout(() => { eventOverlay.style.display = "none"; }, 5000);
        }
    });

    onValue(ref(db, `rooms/${room}/players`), snap => {
        const p = snap.val() || {}; currentPlayers = Object.keys(p);
        const sorted = Object.entries(p).sort((a,b) => b[1] - a[1]);
        liveScoreList.innerHTML = sorted.map(([n, s]) => `<div class="live-item"><span>${n}</span><span>${s} Pkt.</span></div>`).join("");
    });
}

function setupInput(q) {
    const area = document.getElementById("dynamicInput");
    if(q.trim().toLowerCase().startsWith("wer")) {
        let opts = currentPlayers.map(p => `<option value="${p.trim()}">${p.trim()}</option>`).join("");
        area.innerHTML = `<select id="ansInp"><option value="">-- Wen meinst du? --</option>${opts}</select>`;
    } else { area.innerHTML = `<input id="ansInp" placeholder="Deine Antwort...">`; }
}

async function evaluateVote(isAuto, manualWinnerName = null) {
    const ansSnap = await get(ref(db, `rooms/${room}/answers`));
    const allAns = ansSnap.val() || {};
    
    let winnerNames = [];
    if(isAuto) {
        const counts = {};
        Object.values(allAns).forEach(v => { if(v) counts[v] = (counts[v] || 0) + 1; });
        const entries = Object.entries(counts);
        if(entries.length === 0) return;
        const max = Math.max(...entries.map(e => e[1]));
        winnerNames = entries.filter(e => e[1] === max).map(e => e[0]);
    } else {
        winnerNames = [manualWinnerName];
    }

    const pSnap = await get(ref(db, `rooms/${room}/players`));
    let players = pSnap.val() || {};
    let scorers = [];

    Object.keys(allAns).forEach(voter => {
        if(winnerNames.includes(allAns[voter])) {
            players[voter] = (players[voter] || 0) + 1;
            scorers.push(voter);
        }
    });

    await set(ref(db, `rooms/${room}/players`), players);
    await update(ref(db, `rooms/${room}/state`), { 
        lastResult: { winners: winnerNames, scorers: scorers, ts: Date.now() } 
    });
}

function showResultBanner(res) {
    if(!res) return;
    resultBanner.style.display = "block";
    const isWinner = res.scorers.includes(user);
    resultBanner.innerHTML = `
        <div style="font-size:0.9rem">Meiste Stimmen für:</div>
        <div style="font-size:1.3rem; font-weight:bold; color:var(--gold)">${res.winners.join(", ")}</div>
        <div style="margin-top:5px; font-weight:bold; color:${isWinner ? 'var(--green)' : 'white'}">
            ${isWinner ? "🎯 DU HAST EINEN PUNKT ERHALTEN!" : "Kein Punkt für dich."}
        </div>
    `;
}

async function loadBigScores(res) {
    const snap = await get(ref(db, `rooms/${room}/players`));
    const p = snap.val() || {};
    const sorted = Object.entries(p).sort((a,b) => b[1] - a[1]);
    bigScoreArea.innerHTML = sorted.map(([n, s], i) => {
        const hasPoint = res && res.scorers.includes(n);
        return `
        <div class="score-item ${i === 0 ? 'rank-1' : ''}" style="animation-delay: ${i * 0.1}s">
            <span>${i === 0 ? '👑' : i + 1 + '.'} ${n} ${hasPoint ? '<span class="plus-one">+1</span>' : ''}</span>
            <strong>${s} Pkt.</strong>
        </div>`;
    }).join("");
}

async function loadVotes() {
    voteArea.innerHTML = "<p style='font-size:0.8rem; opacity:0.6'>Wähle die beste Antwort:</p>";
    const snap = await get(ref(db, `rooms/${room}/answers`));
    const ans = snap.val() || {};
    const uniqueAns = [...new Set(Object.values(ans))];
    uniqueAns.forEach(text => {
        const b = document.createElement("button");
        b.className = "vote-btn"; b.innerText = text;
        b.onclick = async () => {
            voteArea.innerHTML = "<h4>Werte aus...</h4>";
            await evaluateVote(false, text);
            update(ref(db, `rooms/${room}/state`), { phase: "score" });
        };
        voteArea.appendChild(b);
    });
}

btnNext.onclick = async () => {
    const s = (await get(ref(db, `rooms/${room}/state`))).val();
    const nIdx = (s.qIdx || 0) + 1;
    if(nIdx >= s.gameQs.length) return alert("Alle Fragen durch!");
    await set(ref(db, `rooms/${room}/answers`), {});
    await update(ref(db, `rooms/${room}/state`), { phase: "answer", qIdx: nIdx, endTime: Date.now() + 21000, lastResult: null });
    waitMsg.innerText = "";
};

btnVote.onclick = async () => {
    const s = (await get(ref(db, `rooms/${room}/state`))).val();
    const q = s.gameQs[s.qIdx];
    if(q.trim().toLowerCase().startsWith("wer")) {
        await evaluateVote(true);
        update(ref(db, `rooms/${room}/state`), { phase: "score" });
    } else {
        update(ref(db, `rooms/${room}/state`), { phase: "vote" });
    }
};

btnScore.onclick = () => update(ref(db, `rooms/${room}/state`), { phase: "score" });
btnEvent.onclick = () => {
    const r = drinkRules[Math.floor(Math.random()*drinkRules.length)];
    update(ref(db, `rooms/${room}/state/event`), { text: r, ts: Date.now() });
};
btnReset.onclick = () => { if(confirm("Reset?")) remove(ref(db, `rooms/${room}`)).then(()=>location.reload()); };
btnSend.onclick = () => {
    const v = document.getElementById("ansInp").value;
    if(!v) return;
    set(ref(db, `rooms/${room}/answers/${user}`), v.trim());
    inputArea.style.display = "none"; waitMsg.innerText = "✅ Gesendet!";
};
btnPlayer.onclick = () => start(false);
btnHost.onclick = () => start(true);
</script>
</body>
</html>
