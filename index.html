<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bierkultur - GV 2026</title>
    <style>
        :root { --gold: #ffcc00; --dark: #1a1a1a; --grey: #333; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; text-align: center; padding: 10px; margin: 0; }
        .container { max-width: 500px; margin: 10px auto; background: var(--grey); padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .logo-area img { width: 120px; height: 120px; object-fit: contain; margin-bottom: 10px; }
        .gv-info { font-size: 0.8em; color: var(--gold); margin-bottom: 20px; font-weight: bold; }
        .hidden { display: none !important; }
        input, select, button { width: 100%; padding: 15px; margin: 8px 0; border-radius: 10px; border: none; font-size: 1rem; box-sizing: border-box; }
        button { background: var(--gold); color: black; font-weight: bold; cursor: pointer; border-bottom: 3px solid #b89500; }
        button:active { border-bottom: none; transform: translateY(2px); }
        .btn-host { background: #3498db; color: white; border-bottom-color: #246999; }
        .btn-vote { background: #444; color: white; border: 2px solid var(--gold); }
        .score-list { background: #222; padding: 15px; border-radius: 10px; margin-top: 25px; text-align: left; }
        .score-entry { display: flex; justify-content: space-between; border-bottom: 1px solid #333; padding: 8px 0; }
        #questionDisplay { font-size: 1.5rem; margin: 20px 0; color: var(--gold); font-weight: bold; min-height: 60px; }
        .host-box { background: #444; padding: 15px; border-radius: 12px; border: 2px solid var(--gold); margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-area">
        <a href="https://bierkultur.beer/" target="_blank">
            <img src="https://bierkultur.beer/wp-content/uploads/2021/10/logo-bierkultur-1.png" 
                 id="bkLogo" alt="Bierkultur Logo">
        </a>
        <div class="gv-info">GV Brittnau • 21.03.2026</div>
    </div>

    <!-- LOGIN -->
    <div id="login">
        <input type="text" id="userName" placeholder="Dein Name">
        <input type="text" id="roomCode" placeholder="Raum Code">
        <div id="setupHost">
            <select id="gameSelect">
                <option value="game1">Smalltalk-Fail</option>
                <option value="game2">Wer würde eher?</option>
                <option value="game3">Quatsch-Lexikon</option>
            </select>
            <button id="joinHostBtn" class="btn-host">Als HOST beitreten</button>
        </div>
        <button id="joinPlayerBtn">Als SPIELER beitreten</button>
    </div>

    <!-- SPIEL -->
    <div id="gameArea" class="hidden">
        <div id="hostPanel" class="hidden host-box">
            <button id="nextBtn">NÄCHSTE FRAGE STARTEN</button>
            <button id="voteBtn" style="background:#fff;">VOTING FREIGEBEN</button>
        </div>

        <div id="questionDisplay">Warte auf Host...</div>

        <!-- ANTWORT -->
        <div id="answerSection" class="hidden">
            <div id="inputUI">
                <input type="text" id="answerInput" placeholder="Deine Antwort...">
                <button id="sendBtn">ANTWORT SENDEN</button>
            </div>
            <p id="waitMsg" class="hidden">✅ Gesendet! Bitte warten...</p>
        </div>

        <!-- VOTING -->
        <div id="voteSection" class="hidden">
            <p>Wähle den besten Beitrag:</p>
            <div id="voteButtons"></div>
        </div>

        <div class="score-list">
            <strong>Rangliste</strong>
            <div id="scoreDisplay"></div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCH5KfFTwISrjvXQQiX9GBw9AFhB1Ihos4",
        authDomain: "bierkultur-d2fea.firebaseapp.com",
        databaseURL: "https://bierkultur-d2fea-default-rtdb.europe-west1.firebasedatabase.app/",
        projectId: "bierkultur-d2fea",
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const questions = {
        game1: ["Meistgeklautes Hotel-Objekt?", "Dümmste Büro-Ausrede?", "Tinder-Fail Story?"],
        game2: ["Wer ruft betrunken den Chef an?", "Wer hat die peinlichste Jugendsünde?", "Wer lügt am besten?"],
        game3: ["Was bedeutet IKEA wirklich?", "Neue Tinder-Funktion:", "Männer-Chat Name:"]
    };

    let myName, myRoom, iAmHost = false, localQIdx = -1;

    async function join(asHost) {
        myName = document.getElementById('userName').value.trim();
        myRoom = document.getElementById('roomCode').value.trim().toUpperCase();
        if(!myName || !myRoom) return alert("Fehlende Daten!");

        const stateRef = ref(db, `rooms/${myRoom}/state`);
        const snap = await get(stateRef);

        if(asHost) {
            if(snap.exists() && snap.val().host) return alert("Host existiert schon!");
            await set(stateRef, { host: myName, mode: document.getElementById('gameSelect').value, phase: 'lobby', qIdx: 0 });
            iAmHost = true;
        } else {
            iAmHost = (snap.exists() && snap.val().host === myName);
        }

        await update(ref(db, `rooms/${myRoom}/players`), { [myName]: 0 });
        document.getElementById('login').classList.add('hidden');
        document.getElementById('gameArea').classList.remove('hidden');
        if(iAmHost) document.getElementById('hostPanel').classList.remove('hidden');

        startSync();
    }

    document.getElementById('joinHostBtn').onclick = () => join(true);
    document.getElementById('joinPlayerBtn').onclick = () => join(false);

    function startSync() {
        onValue(ref(db, `rooms/${myRoom}/state`), snap => {
            const data = snap.val();
            if(!data) return;

            // DER ENTSCHEIDENDE FIX: 
            // Wenn die Fragen-ID in Firebase höher ist als unsere lokale ID -> UI RESET
            if(data.qIdx > localQIdx) {
                localQIdx = data.qIdx;
                document.getElementById('inputUI').classList.remove('hidden');
                document.getElementById('waitMsg').classList.add('hidden');
                document.getElementById('answerInput').value = "";
                document.getElementById('voteButtons').innerHTML = "";
            }

            if(data.phase === 'answer') {
                const qList = questions[data.mode] || [];
                document.getElementById('questionDisplay').innerText = qList[data.qIdx % qList.length];
                document.getElementById('answerSection').classList.remove('hidden');
                document.getElementById('voteSection').classList.add('hidden');
            } 
            else if(data.phase === 'vote') {
                document.getElementById('answerSection').classList.add('hidden');
                document.getElementById('voteSection').classList.remove('hidden');
                renderVotes();
            }
        });

        onValue(ref(db, `rooms/${myRoom}/players`), snap => {
            const players = snap.val() || {};
            document.getElementById('scoreDisplay').innerHTML = Object.entries(players)
                .sort((a,b) => b[1]-a[1])
                .map(([n,s])=>`<div class="score-entry"><span>${n}</span><span>${s} Pkt</span></div>`).join("");
        });
    }

    // HOST
    document.getElementById('nextBtn').onclick = async () => {
        const stateRef = ref(db, `rooms/${myRoom}/state`);
        const snap = await get(stateRef);
        const next = (snap.val().qIdx || 0) + 1;
        
        await set(ref(db, `rooms/${myRoom}/answers`), {}); 
        await update(stateRef, { phase: 'answer', qIdx: next });
    };

    document.getElementById('voteBtn').onclick = () => {
        update(ref(db, `rooms/${myRoom}/state`), { phase: 'vote' });
    };

    // SPIELER
    document.getElementById('sendBtn').onclick = () => {
        const text = document.getElementById('answerInput').value.trim();
        if(!text) return;
        set(ref(db, `rooms/${myRoom}/answers/${myName}`), text);
        document.getElementById('inputUI').classList.add('hidden');
        document.getElementById('waitMsg').classList.remove('hidden');
    };

    function renderVotes() {
        const container = document.getElementById('voteButtons');
        if(container.innerHTML !== "") return;
        get(ref(db, `rooms/${myRoom}/answers`)).then(snap => {
            const ans = snap.val() || {};
            Object.entries(ans).forEach(([name, text]) => {
                if(name === myName) return;
                const b = document.createElement('button');
                b.className = "btn-vote";
                b.innerText = text;
                b.onclick = async () => {
                    container.innerHTML = "✅ Stimme gezählt!";
                    const pRef = ref(db, `rooms/${myRoom}/players/${name}`);
                    const pSnap = await get(pRef);
                    update(ref(db, `rooms/${myRoom}/players`), { [name]: (pSnap.val() || 0) + 1 });
                };
                container.appendChild(b);
            });
        });
    }

    // Logo Fix
    const logoImg = document.getElementById('bkLogo');
    const svgLogo = "https://bierkultur.beer/wp-content/uploads/2025/11/BK_Logo_Round_Thick.svg";
    const imgTester = new Image();
    imgTester.onload = () => logoImg.src = svgLogo;
    imgTester.src = svgLogo;
</script>
</body>
</html>
