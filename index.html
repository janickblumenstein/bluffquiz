<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BluffQuiz Party Edition – Host Version 😈</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, onValue, get, child } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

// 🔥 Füge hier DEINE Firebase Config ein
const firebaseConfig = {
  apiKey: "AIzaSyCH5KfFTwISrjvXQQiX9GBw9AFhB1Ihos4",
  authDomain: "bierkultur-d2fea.firebaseapp.com",
  databaseURL: "https://bierkultur-d2fea-default-rtdb.europe-west1.firebasedatabase.app/",
  projectId: "bierkultur-d2fea",
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// -------------------- Spieler & Raum --------------------
let player = "";
let room = "0819";  // fixierter Raumcode
let isHost = false;
let currentGame = "game1";
let currentQuestionIndex = 0;

// -------------------- Fragen --------------------
const game1_questions = [
  "Das meistgeklaute Objekt in Hotels weltweit ist…",
  "Die dümmste Ausrede fürs Zuspätkommen im Büro war…",
  "Das peinlichste, was ein Mann auf Tinder erlebt hat…",
  "Die schlimmste Lüge beim ersten Date war…",
  "Der peinlichste Job, den jemand geheim hält, ist…",
  "Was ein Typ heimlich googelt, aber nie zugibt…",
  "Das absurdeste Alkohol-Desaster im Urlaub war…",
  "Der schlechteste Anmachspruch aller Zeiten…",
  "Die absurdeste Ausrede für das Vergessen eines Geburtstags…",
  "Das dämlichste, was ein Mann betrunken getan hat…"
];

const game2_questions = [
  "Wer würde am ehesten betrunken den Chef anrufen?",
  "Wer hat die peinlichste Jugendsünde?",
  "Wer würde heimlich für Geld alles machen?",
  "Wer schreibt nachts betrunken Nachrichten, die er bereut?",
  "Wer lügt am meisten ohne rot zu werden?",
  "Wer würde am schnellsten im Knast landen?",
  "Wer hat die schlimmsten Eltern-Storys?",
  "Wer ist heimlich der größte Drama-Magnet?",
  "Wer übertreibt im Urlaub am meisten?",
  "Wer hat die absurdeste Tattoo-Idee?"
];

const game3_questions = [
  "Wofür steht IKEA wirklich?",
  "Neue Tinder Premium Funktion:",
  "Was steht heimlich auf dem Männer-Gruppenchat?",
  "Das schlimmste, was man beim ersten Date sagen kann:",
  "Neuer Werbeslogan für Bier:",
  "Die dämlichste Ausrede, um nicht zum Training zu gehen:",
  "Das absurdeste Geschenk für die Freundin:",
  "Was man niemals laut im Büro sagen sollte:",
  "Das schlechteste Pick-Up-Line aller Zeiten:",
  "Eine völlig absurde Verschwörung, die Männer glauben könnten:"
];

const questionsByGame = { game1: game1_questions, game2: game2_questions, game3: game3_questions };

// -------------------- Chaos Features --------------------
const systemFakes = [
  "Ein Einhorn hat es getan",
  "Mein Ex war schuld",
  "Das NSA-Team",
  "Aliens übernehmen die Macht",
  "Mein Hamster wollte es so"
];

// -------------------- Host & Spieler --------------------
window.join = function() {
  player = document.getElementById("name").value;
  let codeInput = document.getElementById("room").value;
  if (codeInput !== room) {
    alert("Falscher Raumcode!");
    return;
  }

  isHost = document.getElementById("hostCheck").checked;

  set(ref(db, "rooms/" + room + "/players/" + player), { score: 0 });
  document.getElementById("login").style.display = "none";
  document.getElementById("game").style.display = "block";

  listenAnswers();
  listenVotes();
  updateLeaderboard();
};

// -------------------- Host Controls --------------------
window.nextQuestion = function() {
  currentQuestionIndex++;
  if (currentQuestionIndex >= questionsByGame[currentGame].length) currentQuestionIndex = 0;
  const q = questionsByGame[currentGame][currentQuestionIndex];
  set(ref(db, "rooms/" + room + "/currentQuestion"), q);
  set(ref(db, "rooms/" + room + "/answers"), {}); // reset answers
  set(ref(db, "rooms/" + room + "/votes"), {});   // reset votes
  document.getElementById("voting").style.display = "none";
};

window.revealAnswers = function() {
  document.getElementById("voting").style.display = "block";
};

// -------------------- Spieler antworten --------------------
window.submitAnswer = function() {
  let val = document.getElementById("answer").value;
  if (!val) return;
  set(ref(db, "rooms/" + room + "/answers/" + player), val);

  // System Fake zufügen
  let sysFake = systemFakes[Math.floor(Math.random() * systemFakes.length)];
  set(ref(db, "rooms/" + room + "/answers/SYSTEM"), sysFake);

  document.getElementById("answerBox").innerHTML = "Antwort gesendet 😄";
};

// -------------------- Voting --------------------
function vote(target) {
  set(ref(db, "rooms/" + room + "/votes/" + player), target);
  alert("Du hast gewählt: " + target);
}

// -------------------- Live Updates --------------------
function listenAnswers() {
  onValue(ref(db, "rooms/" + room + "/currentQuestion"), (snap) => {
    const q = snap.val();
    if (q) document.getElementById("question").innerText = q;
  });
}

function listenVotes() {
  onValue(ref(db, "rooms/" + room + "/answers"), (snap) => {
    const data = snap.val();
    if (!data) return;
    const votingDiv = document.getElementById("voting");
    votingDiv.innerHTML = "";
    Object.entries(data).forEach(([p, text]) => {
      let btn = document.createElement("button");
      btn.innerText = text;
      btn.onclick = () => vote(p);
      votingDiv.appendChild(btn);
      votingDiv.appendChild(document.createElement("br"));
    });
  });
}

// -------------------- Leaderboard --------------------
function updateLeaderboard() {
  onValue(ref(db, "rooms/" + room + "/votes"), (snap) => {
    const votes = snap.val();
    if (!votes) return;
    const scores = {};
    Object.values(votes).forEach(target => {
      scores[target] = (scores[target] || 0) + 1;
    });
    let text = "🏆 Punkte:<br>";
    Object.entries(scores).forEach(([p, s]) => { text += p + ": " + s + "<br>"; });
    document.getElementById("leaderboard").innerHTML = text;
  });
}
</script>

<style>
body { font-family: Arial; background:#111; color:#fff; text-align:center; }
input, button, select { padding:10px; margin:5px; font-size:16px; }
.card { margin:20px; padding:20px; background:#222; border-radius:10px; }
#voting { display:none; }
</style>

<body>
<h1>🔥 BluffQuiz Party Edition – Host 😈</h1>

<div id="login" class="card">
  <input id="name" placeholder="Dein Name">
  <input id="room" placeholder="Raum-Code z.B. 0819">
  <label><input type="checkbox" id="hostCheck"> Ich bin Host</label>
  <select id="gameSelect" onchange="currentGame=this.value;">
    <option value="game1">Fake oder Fakt</option>
    <option value="game2">Wer von uns…?</option>
    <option value="game3">Dümmste Antwort gewinnt</option>
  </select>
  <button onclick="join()">Join</button>
</div>

<div id="game" class="card" style="display:none">
  <h2 id="question">Frage erscheint hier</h2>
  <div id="answerBox">
    <input id="answer" placeholder="Deine Antwort">
    <button onclick="submitAnswer()">Absenden</button>
  </div>

  <div id="hostControls" style="margin:10px;">
    <button onclick="nextQuestion()" style="background:#4CAF50">Nächste Frage</button>
    <button onclick="revealAnswers()" style="background:#FF5722">Antworten freischalten</button>
  </div>

  <div id="voting" class="card"></div>
  <h3 id="leaderboard"></h3>
</div>
</body>
</html>
