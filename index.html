<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bierkultur GV 2026</title>
    <style>
        :root { --gold: #ffcc00; --dark: #1a1a1a; --grey: #333; }
        body { font-family: sans-serif; background: var(--dark); color: white; text-align: center; margin: 0; padding: 10px; }
        .container { max-width: 450px; margin: auto; background: var(--grey); padding: 20px; border-radius: 15px; border: 1px solid #444; }
        
        /* Logo Fix: Wir nutzen das Standard-PNG als sichere Basis */
        .logo { width: 120px; height: 120px; margin: 0 auto 10px; background: url('https://bierkultur.beer/wp-content/uploads/2021/10/logo-bierkultur-1.png') no-repeat center; background-size: contain; }
        
        .gv-tag { color: var(--gold); font-size: 0.8rem; font-weight: bold; margin-bottom: 20px; }
        .hidden { display: none !important; }
        
        input, select, button { width: 100%; padding: 15px; margin: 10px 0; border-radius: 8px; border: none; font-size: 1rem; box-sizing: border-box; }
        button { background: var(--gold); color: #000; font-weight: bold; cursor: pointer; }
        .btn-host { background: #3498db; color: #fff; }
        .btn-vote { background: #444; color: #fff; border: 1px solid var(--gold); }
        
        #questionDisplay { font-size: 1.4rem; color: var(--gold); margin: 20px 0; min-height: 40px; }
        .score-list { background: #222; padding: 10px; border-radius: 8px; margin-top: 20px; text-align: left; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo"></div>
    <div class="gv-tag">GENERALVERSAMMLUNG BRITTNAU • 21.03.2026</div>

    <!-- LOGIN -->
    <div id="loginArea">
        <input type="text" id="uName" placeholder="Dein Name">
        <input type="text" id="rCode" placeholder="Raum Code">
        <div id="hostOnly">
            <select id="gMode">
                <option value="game1">Smalltalk-Fail</option>
                <option value="game2">Wer würde eher?</option>
                <option value="game3">Quatsch-Lexikon</option>
            </select>
            <button onclick="joinGame(true)" class="btn-host">ALS HOST STARTEN</button>
        </div>
        <button onclick="joinGame(false)">ALS SPIELER BEITRETEN</button>
    </div>

    <!-- GAME -->
    <div id="gameArea" class="hidden">
        <div id="hostControls" class="hidden" style="border: 1px dashed var(--gold); padding: 10px; margin-bottom: 20px;">
            <button onclick="hostNext()">NÄCHSTE FRAGE</button>
            <button onclick="hostVote()" style="background:#fff">VOTING STARTEN</button>
        </div>

        <div id="questionDisplay">Warte auf Host...</div>

        <!-- ANTWORT-SLOT -->
        <div id="answerArea" class="hidden">
            <div id="inputGroup">
                <input type="text" id="ansInput" placeholder="Deine Antwort...">
                <button onclick="sendAns()">ANTWORT ABSCHICKEN</button>
            </div>
            <div id="waitMsg" class="hidden">✅ Gesendet! Bitte warten...</div>
        </div>

        <!-- VOTING-SLOT -->
        <div id="voteArea" class="hidden">
            <p>Wähle den Favoriten:</p>
            <div id="voteBtns"></div>
        </div>

        <div class="score-list">
            <div id="scores"></div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const conf = {
        apiKey: "AIzaSyCH5KfFTwISrjvXQQiX9GBw9AFhB1Ihos4",
        authDomain: "bierkultur-d2fea.firebaseapp.com",
        databaseURL: "https://bierkultur-d2fea-default-rtdb.europe-west1.firebasedatabase.app/",
        projectId: "bierkultur-d2fea",
    };

    const app = initializeApp(conf);
    const db = getDatabase(app);

    const qs = {
        game1: ["Meistgeklautes Hotel-Objekt?", "Dümmste Büro-Ausrede?", "Tinder-Fail Story?"],
        game2: ["Wer ruft betrunken den Chef an?", "Wer hat die peinlichste Jugendsünde?", "Wer lügt am besten?"],
        game3: ["Was bedeutet IKEA wirklich?", "Neue Tinder-Funktion:", "Männer-Chat Name:"]
    };

    let user, room, isH = false, lastQ = -1;

    // Global machen für die Buttons
    window.joinGame = async (h) => {
        user = document.getElementById('uName').value.trim();
        room = document.getElementById('rCode').value.trim().toUpperCase();
        if(!user || !room) return alert("Name/Raum fehlt!");

        const sRef = ref(db, `rooms/${room}/state`);
        const snap = await get(sRef);

        if(h) {
            if(snap.exists() && snap.val().host) return alert("Host existiert schon!");
            await set(sRef, { host: user, mode: document.getElementById('gMode').value, phase: 'lobby', qIdx: 0 });
            isH = true;
        } else {
            isH = (snap.exists() && snap.val().host === user);
        }

        await update(ref(db, `rooms/${room}/players`), { [user]: 0 });
        document.getElementById('loginArea').classList.add('hidden');
        document.getElementById('gameArea').classList.remove('hidden');
        if(isH) document.getElementById('hostControls').classList.remove('hidden');

        // Sync starten
        onValue(ref(db, `rooms/${room}/state`), s => {
            const d = s.val();
            if(!d) return;

            // RADIKALER RESET WENN qIdx STEIGT
            if(d.qIdx > lastQ) {
                lastQ = d.qIdx;
                document.getElementById('inputGroup').classList.remove('hidden');
                document.getElementById('waitMsg').classList.add('hidden');
                document.getElementById('ansInput').value = "";
                document.getElementById('voteBtns').innerHTML = "";
            }

            if(d.phase === 'answer') {
                document.getElementById('questionDisplay').innerText = qs[d.mode][d.qIdx % qs[d.mode].length];
                document.getElementById('answerArea').classList.remove('hidden');
                document.getElementById('voteArea').classList.add('hidden');
            } else if(d.phase === 'vote') {
                document.getElementById('answerArea').classList.add('hidden');
                document.getElementById('voteArea').classList.remove('hidden');
                loadVotes();
            }
        });

        onValue(ref(db, `rooms/${room}/players`), s => {
            const p = s.val() || {};
            document.getElementById('scores').innerHTML = Object.entries(p)
                .sort((a,b)=>b[1]-a[1])
                .map(([n,v])=>`<div>${n}: ${v} Pkt</div>`).join("");
        });
    };

    window.hostNext = async () => {
        const s = await get(ref(db, `rooms/${room}/state`));
        const nIdx = (s.val().qIdx || 0) + 1;
        await set(ref(db, `rooms/${room}/answers`), {});
        await update(ref(db, `rooms/${room}/state`), { phase: 'answer', qIdx: nIdx });
    };

    window.hostVote = () => update(ref(db, `rooms/${room}/state`), { phase: 'vote' });

    window.sendAns = () => {
        const val = document.getElementById('ansInput').value.trim();
        if(!val) return;
        set(ref(db, `rooms/${room}/answers/${user}`), val);
        document.getElementById('inputGroup').classList.add('hidden');
        document.getElementById('waitMsg').classList.remove('hidden');
    };

    async function loadVotes() {
        const container = document.getElementById('voteBtns');
        if(container.innerHTML !== "") return;
        const snap = await get(ref(db, `rooms/${room}/answers`));
        const ans = snap.val() || {};
        Object.entries(ans).forEach(([name, text]) => {
            if(name === user) return;
            const b = document.createElement('button');
            b.className = "btn-vote";
            b.innerText = text;
            b.onclick = async () => {
                container.innerHTML = "Stimme gezählt!";
                const pRef = ref(db, `rooms/${room}/players/${name}`);
                const pSnap = await get(pRef);
                update(ref(db, `rooms/${room}/players`), { [name]: (pSnap.val()||0)+1 });
            };
            container.appendChild(b);
        });
    }
</script>
</body>
</html>
