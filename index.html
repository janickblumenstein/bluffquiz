<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bierkultur - GV 2026</title>
    <style>
        :root { --gold: #ffcc00; --dark: #1a1a1a; --grey: #333; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--dark); color: white; text-align: center; padding: 10px; }
        .container { max-width: 600px; margin: 20px auto; background: var(--grey); padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .logo-area img { max-width: 120px; filter: drop-shadow(0 0 5px rgba(255,204,0,0.5)); }
        .gv-info { font-size: 0.8em; color: var(--gold); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .hidden { display: none; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; box-sizing: border-box; font-size: 1rem; }
        button { background: var(--gold); color: black; font-weight: bold; cursor: pointer; border-bottom: 3px solid #b89500; }
        button:active { border-bottom: none; transform: translateY(2px); }
        .btn-host { background: #4a90e2; color: white; border-bottom-color: #2c5a8d; }
        .btn-vote { background: #444; color: white; border: 1px solid var(--gold); margin-bottom: 10px; }
        .score-list { background: #222; padding: 15px; border-radius: 12px; margin-top: 25px; border: 1px solid #444; }
        .score-entry { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #333; }
        #questionDisplay { min-height: 60px; color: var(--gold); }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-area">
        <a href="https://bierkultur.beer/" target="_blank">
            <img src="https://bierkultur.beer/wp-content/uploads/2021/10/logo-bierkultur-1.png" alt="Bierkultur Logo">
        </a>
        <div class="gv-info">Generalversammlung • Brittnau • 21.03.2026</div>
    </div>

    <!-- LOGIN SCREEN -->
    <div id="login">
        <input type="text" id="userName" placeholder="Dein Name">
        <input type="text" id="roomCode" placeholder="Raum Code (z.B. GV26)">
        <div id="hostSelectionArea">
            <select id="gameSelect">
                <option value="game1">Smalltalk-Fail</option>
                <option value="game2">Wer würde eher?</option>
                <option value="game3">Quatsch-Lexikon</option>
            </select>
            <button id="joinHostBtn" class="btn-host">Als HOST beitreten</button>
            <hr style="border:0; border-top: 1px solid #555; margin: 15px 0;">
        </div>
        <button id="joinPlayerBtn">Als SPIELER beitreten</button>
    </div>

    <!-- GAME AREA -->
    <div id="gameArea" class="hidden">
        <h2 id="gameTitle">Warte auf Start...</h2>
        
        <div id="hostPanel" class="hidden">
            <div style="background: #444; padding: 10px; border-radius: 10px; margin-bottom: 15px;">
                <button id="nextBtn">Nächste Runde starten</button>
                <button id="voteBtn" style="background: #eee;">Voting freigeben</button>
            </div>
        </div>

        <h3 id="questionDisplay">Der Host bereitet die erste Frage vor...</h3>

        <div id="answerSection" class="hidden">
            <div id="inputBox">
                <input type="text" id="answerInput" placeholder="Deine Antwort hier tippen...">
                <button id="sendAnswerBtn">Antwort abschicken</button>
            </div>
            <p id="waitMsg" class="hidden">✅ Antwort gesendet. Warte auf die anderen...</p>
        </div>

        <div id="voteSection" class="hidden">
            <h4>Wer hat am besten geantwortet?</h4>
            <div id="voteButtons"></div>
        </div>

        <div class="score-list">
            <strong>Aktuelle Rangliste</strong>
            <div id="scoreList"></div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCH5KfFTwISrjvXQQiX9GBw9AFhB1Ihos4",
        authDomain: "bierkultur-d2fea.firebaseapp.com",
        databaseURL: "https://bierkultur-d2fea-default-rtdb.europe-west1.firebasedatabase.app/",
        projectId: "bierkultur-d2fea",
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const questions = {
        game1: ["Meistgeklautes Hotel-Objekt?", "Dümmste Büro-Ausrede?", "Tinder-Fail Story?"],
        game2: ["Wer ruft betrunken den Chef an?", "Wer hat die peinlichste Jugendsünde?", "Wer lügt am besten?"],
        game3: ["Was bedeutet IKEA wirklich?", "Neue Tinder-Funktion:", "Männer-Chat Name:"]
    };

    let myName, myRoom, iAmHost = false, lastSyncedQ = -2;

    // LOGIN LOGIK
    async function join(asHost) {
        myName = document.getElementById('userName').value.trim();
        myRoom = document.getElementById('roomCode').value.trim().toUpperCase();
        if (!myName || !myRoom) return alert("Bitte Name und Raum ausfüllen!");

        const stateRef = ref(db, `rooms/${myRoom}/state`);
        const snap = await get(stateRef);

        if (asHost) {
            if (snap.exists() && snap.val().host) return alert("Es gibt schon einen Host!");
            await set(stateRef, { host: myName, mode: document.getElementById('gameSelect').value, phase: 'lobby', qIdx: -1 });
            iAmHost = true;
        } else {
            iAmHost = (snap.exists() && snap.val().host === myName);
        }

        await update(ref(db, `rooms/${myRoom}/players`), { [myName]: 0 });
        document.getElementById('login').classList.add('hidden');
        document.getElementById('gameArea').classList.remove('hidden');
        if (iAmHost) document.getElementById('hostPanel').classList.remove('hidden');

        startSync();
    }

    document.getElementById('joinHostBtn').onclick = () => join(true);
    document.getElementById('joinPlayerBtn').onclick = () => join(false);

    // SYNC LOGIK (Der Kern des Spiels)
    function startSync() {
        onValue(ref(db, `rooms/${myRoom}/state`), snap => {
            const data = snap.val();
            if (!data) return;

            document.getElementById('gameTitle').innerText = data.mode.toUpperCase();

            // Check ob neue Runde gestartet wurde (Reset UI)
            if (data.qIdx !== lastSyncedQ) {
                lastSyncedQ = data.qIdx;
                resetRoundUI(); 
            }

            if (data.phase === 'answer') {
                const qList = questions[data.mode] || [];
                document.getElementById('questionDisplay').innerText = qList[data.qIdx % qList.length] || "Warten...";
                document.getElementById('answerSection').classList.remove('hidden');
                document.getElementById('voteSection').classList.add('hidden');
            } 
            else if (data.phase === 'vote') {
                document.getElementById('answerSection').classList.add('hidden');
                document.getElementById('voteSection').classList.remove('hidden');
                renderVotes();
            }
        });

        onValue(ref(db, `rooms/${myRoom}/players`), snap => {
            const players = snap.val() || {};
            document.getElementById('scoreList').innerHTML = Object.entries(players)
                .sort((a, b) => b[1] - a[1])
                .map(([n, s]) => `<div class="score-entry"><span>${n}</span><span>${s} Pkt</span></div>`).join("");
        });
    }

    function resetRoundUI() {
        // Macht das Eingabefeld für alle wieder sichtbar
        document.getElementById('inputBox').classList.remove('hidden');
        document.getElementById('waitMsg').classList.add('hidden');
        document.getElementById('answerInput').value = "";
        document.getElementById('voteButtons').innerHTML = "";
    }

    // HOST AKTIONEN
    document.getElementById('nextBtn').onclick = async () => {
        const stateRef = ref(db, `rooms/${myRoom}/state`);
        const snap = await get(stateRef);
        const currentData = snap.val();
        const nextIdx = (currentData.qIdx || 0) + 1;
        
        await set(ref(db, `rooms/${myRoom}/answers`), {}); // Antworten löschen
        await update(stateRef, { phase: 'answer', qIdx: nextIdx });
    };

    document.getElementById('voteBtn').onclick = () => {
        update(ref(db, `rooms/${myRoom}/state`), { phase: 'vote' });
    };

    // SPIELER AKTIONEN
    document.getElementById('sendAnswerBtn').onclick = () => {
        const val = document.getElementById('answerInput').value.trim();
        if (!val) return;
        set(ref(db, `rooms/${myRoom}/answers/${myName}`), val);
        document.getElementById('inputBox').classList.add('hidden');
        document.getElementById('waitMsg').classList.remove('hidden');
    };

    function renderVotes() {
        const container = document.getElementById('voteButtons');
        if (container.innerHTML !== "") return; // Schon gerendert

        get(ref(db, `rooms/${myRoom}/answers`)).then(snap => {
            const answers = snap.val() || {};
            container.innerHTML = "";
            
            Object.entries(answers).forEach(([name, text]) => {
                if (name === myName) return;
                const btn = document.createElement('button');
                btn.innerText = text;
                btn.className = "btn-vote";
                btn.onclick = async () => {
                    container.innerHTML = "<p>Stimme gezählt! ✅</p>";
                    const pRef = ref(db, `rooms/${myRoom}/players/${name}`);
                    const pSnap = await get(pRef);
                    update(ref(db, `rooms/${myRoom}/players`), { [name]: (pSnap.val() || 0) + 1 });
                };
                container.appendChild(btn);
            });
            if (container.innerHTML === "") container.innerHTML = "Keine Antworten eingegangen.";
        });
    }
</script>
</body>
</html>
