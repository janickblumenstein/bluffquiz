<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bierkultur GV 2026</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; text-align: center; margin: 0; padding: 20px; }
        .card { max-width: 400px; margin: auto; background: #333; padding: 20px; border-radius: 15px; border: 2px solid #ffcc00; }
        .logo { font-size: 50px; margin-bottom: 10px; }
        .hidden { display: none !important; }
        input, button, select { width: 100%; padding: 15px; margin: 10px 0; border-radius: 8px; border: none; font-size: 1rem; box-sizing: border-box; }
        button { background: #ffcc00; color: black; font-weight: bold; cursor: pointer; }
        .host-btn { background: #3498db; color: white; }
        #qDisplay { font-size: 1.5rem; color: #ffcc00; margin: 20px 0; font-weight: bold; }
        .score-list { text-align: left; font-size: 0.9rem; background: #222; padding: 10px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="card">
    <div class="logo">🍺</div>
    <div style="color:#ffcc00; font-weight: bold;">BIERKULTUR BRITTNAU</div>
    <hr style="border: 0; border-top: 1px solid #555; margin: 20px 0;">

    <!-- LOGIN -->
    <div id="sectionLogin">
        <input type="text" id="nameInp" placeholder="Dein Name">
        <input type="text" id="roomInp" placeholder="Raum Code (z.B. GV26)">
        <select id="modeSel">
            <option value="game1">Smalltalk-Fail</option>
            <option value="game2">Wer würde eher?</option>
        </select>
        <button id="btnHost" class="host-btn">ALS HOST STARTEN</button>
        <button id="btnPlayer">BEITRETEN</button>
    </div>

    <!-- GAME -->
    <div id="sectionGame" class="hidden">
        <div id="hostControls" class="hidden" style="background: #444; padding: 10px; margin-bottom: 15px;">
            <button id="btnNext">NÄCHSTE FRAGE</button>
            <button id="btnVote" style="background: white;">VOTING STARTEN</button>
        </div>

        <div id="qDisplay">Warte auf Start...</div>

        <!-- INPUT FÜR SPIELER -->
        <div id="inputArea">
            <input type="text" id="ansInp" placeholder="Deine Antwort...">
            <button id="btnSend">ANTWORT ABSCHICKEN</button>
        </div>
        
        <div id="waitMsg" class="hidden">✅ Gesendet! Warten auf Host...</div>

        <!-- VOTING -->
        <div id="voteArea" class="hidden">
            <p>Wähle den Favoriten:</p>
            <div id="voteList"></div>
        </div>

        <div class="score-list">
            <strong>Rangliste:</strong>
            <div id="scoreDisplay"></div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCH5KfFTwISrjvXQQiX9GBw9AFhB1Ihos4",
        authDomain: "bierkultur-d2fea.firebaseapp.com",
        databaseURL: "https://bierkultur-d2fea-default-rtdb.europe-west1.firebasedatabase.app/",
        projectId: "bierkultur-d2fea",
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const quiz = {
        game1: ["Meistgeklautes Hotel-Objekt?", "Dümmste Büro-Ausrede?", "Bier-Fail Story?"],
        game2: ["Wer trinkt am schnellsten?", "Wer vergisst immer seinen Geldbeutel?"]
    };

    let user, room, isH = false, lastIdx = -1;

    async function start(h) {
        user = document.getElementById('nameInp').value.trim();
        room = document.getElementById('roomInp').value.trim().toUpperCase();
        if(!user || !room) return alert("Bitte Name und Raum ausfüllen!");

        isH = h;
        if(isH) {
            await set(ref(db, `rooms/${room}/state`), { 
                host: user, mode: document.getElementById('modeSel').value, phase: 'answer', qIdx: 0 
            });
        }
        
        await update(ref(db, `rooms/${room}/players`), { [user]: 0 });
        document.getElementById('sectionLogin').classList.add('hidden');
        document.getElementById('sectionGame').classList.remove('hidden');
        if(isH) document.getElementById('hostControls').classList.remove('hidden');

        // SYNC START
        onValue(ref(db, `rooms/${room}/state`), snap => {
            const d = snap.val();
            if(!d) return;

            // ERZWUNGENER RESET BEI JEDEM WECHSEL DER FRAGEN-NUMMER
            if(d.qIdx !== lastIdx) {
                lastIdx = d.qIdx;
                document.getElementById('inputArea').classList.remove('hidden');
                document.getElementById('waitMsg').classList.add('hidden');
                document.getElementById('voteArea').classList.add('hidden');
                document.getElementById('ansInp').value = "";
                document.getElementById('voteList').innerHTML = "";
            }

            if(d.phase === 'answer') {
                document.getElementById('qDisplay').innerText = quiz[d.mode][d.qIdx % quiz[d.mode].length];
            } else if(d.phase === 'vote') {
                document.getElementById('inputArea').classList.add('hidden');
                document.getElementById('waitMsg').classList.add('hidden');
                document.getElementById('voteArea').classList.remove('hidden');
                loadVotes();
            }
        });

        onValue(ref(db, `rooms/${room}/players`), snap => {
            const p = snap.val() || {};
            document.getElementById('scoreDisplay').innerHTML = Object.entries(p)
                .sort((a,b)=>b[1]-a[1]).map(([n,s])=>`<div>${n}: ${s} Pkt</div>`).join("");
        });
    }

    document.getElementById('btnHost').onclick = () => start(true);
    document.getElementById('btnPlayer').onclick = () => start(false);

    document.getElementById('btnSend').onclick = () => {
        const txt = document.getElementById('ansInp').value.trim();
        if(!txt) return;
        set(ref(db, `rooms/${room}/answers/${user}`), txt);
        document.getElementById('inputArea').classList.add('hidden');
        document.getElementById('waitMsg').classList.remove('hidden');
    };

    document.getElementById('btnNext').onclick = async () => {
        const s = await get(ref(db, `rooms/${room}/state`));
        const n = (s.val().qIdx || 0) + 1;
        await set(ref(db, `rooms/${room}/answers`), {});
        await update(ref(db, `rooms/${room}/state`), { phase: 'answer', qIdx: n });
    };

    document.getElementById('btnVote').onclick = () => {
        update(ref(db, `rooms/${room}/state`), { phase: 'vote' });
    };

    async function loadVotes() {
        const list = document.getElementById('voteList');
        if(list.innerHTML !== "") return;
        const snap = await get(ref(db, `rooms/${room}/answers`));
        const ans = snap.val() || {};
        Object.entries(ans).forEach(([name, text]) => {
            if(name === user) return;
            const b = document.createElement('button');
            b.innerText = text;
            b.onclick = async () => {
                list.innerHTML = "Stimme gezählt! 🍻";
                const pRef = ref(db, `rooms/${room}/players/${name}`);
                const pSnap = await get(pRef);
                update(ref(db, `rooms/${room}/players`), { [name]: (pSnap.val() || 0) + 1 });
            };
            list.appendChild(b);
        });
    }
</script>
</body>
</html>
