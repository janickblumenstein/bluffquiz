<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bierkultur GV 2026</title>
    <style>
        :root { --gold:#ffcc00; --dark:#1a1a1a; --grey:#333; --blue: #3498db; --green: #2ecc71; --red: #e74c3c; }
        body { font-family:sans-serif; background:var(--dark); color:white; text-align:center; margin:0; padding:10px; }
        .card { max-width:420px; margin:auto; background:var(--grey); padding:20px; border-radius:15px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); position: relative; }
        input, button, select { width:100%; padding:15px; margin:8px 0; border-radius:10px; border:none; font-size:16px; box-sizing: border-box; }
        button { background:var(--gold); font-weight:bold; cursor:pointer; }
        .btn-host { background:var(--blue); color:white; }
        .btn-score { background:var(--green); color:white; }
        
        #qDisplay { font-size:1.5rem; color:var(--gold); margin:15px 0; font-weight:bold; min-height: 50px; }
        #waitMsg { color: var(--red); font-weight: bold; font-size: 1.2rem; margin: 10px 0; }
        
        /* Ergebnis Banner */
        #resBanner { background: rgba(0,0,0,0.4); border: 2px solid var(--gold); border-radius: 10px; padding: 15px; margin: 10px 0; display: none; }
        .win-text { font-size: 1.2rem; color: var(--gold); display: block; font-weight: bold; }

        .score-item { 
            display:flex; justify-content:space-between; align-items:center;
            background: rgba(255,255,255,0.05); margin: 6px 0; padding:12px; border-radius: 8px;
        }
        .rank-1 { border: 2px solid var(--gold); background: rgba(255, 204, 0, 0.15); }
        .plus-badge { background: var(--green); color: white; padding: 2px 8px; border-radius: 10px; font-size: 0.7rem; margin-left: 8px; animation: pop 0.5s ease-out; }
        @keyframes pop { 0% {transform: scale(0);} 80% {transform: scale(1.3);} 100% {transform: scale(1);} }

        .vote-btn { background:#222; color:white; border:1px solid var(--gold); margin:5px 0; padding:12px; text-align:left; width: 100%; border-radius: 10px; }
        #eventOverlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:9999; display:none; flex-direction:column; align-items:center; justify-content:center; }
    </style>
</head>
<body>

<div class="card">
    <h2>🍺 BIERKULTUR GV26</h2>
    <div id="loginSection">
        <input id="nameInp" placeholder="Dein Name">
        <input id="roomInp" placeholder="Code (GV26)">
        <button id="btnPlayer">Beitreten</button>
        <button id="btnHost" class="btn-host">Als Host starten</button>
    </div>

    <div id="gameSection" style="display:none">
        <div id="hostControls" style="display:none">
            <button id="btnNext">Nächste Frage</button>
            <button id="btnEvaluate" style="background:var(--blue); color:white;">Auswerten (0 Stimmen)</button>
            <button id="btnScore" class="btn-score">🏆 Gesamtrangliste</button>
            <button id="btnReset" style="background:var(--red); color:white; font-size:10px;">Reset</button>
        </div>

        <div id="qDisplay">Warten...</div>
        <div id="waitMsg"></div>

        <!-- Runden-Feedback Banner -->
        <div id="resBanner">
            <small>Gewinner-Antwort:</small>
            <span id="winName" class="win-text">?</span>
            <div id="personalFeedback" style="font-weight:bold; margin-top:8px;"></div>
        </div>

        <div id="inputArea" style="display:none">
            <div id="dynamicInput"></div>
            <button id="btnSend">Senden</button>
        </div>

        <div id="voteArea" style="display:none"></div>
        <div id="bigScoreArea" style="display:none"></div>
        <div id="liveScoreList" style="margin-top:20px; font-size:0.8rem; opacity:0.6;"></div>
    </div>
</div>

<div id="eventOverlay"><div id="eventText"></div></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, onValue, update, get, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = { databaseURL: "https://bierkultur-d2fea-default-rtdb.europe-west1.firebasedatabase.app/" };
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const drinkRules = ["ALLE TRINKEN! 🍻", "Host verteilt 3 Schlucke!", "Brillenträger trinken!", "Letzter trinkt!","ELITEN-TRINKEN! 👑 Die Top 3 der Rangliste trinken","PROST PRÄSIDENT! Der Präsi trinkt","PROST PRÄSIDENT! Alle trinken auf den Präsi"];
const sounds = {
    send: new Audio("https://assets.mixkit.co/sfx/preview/mixkit-select-click-1109.mp3"),
    event: new Audio("https://assets.mixkit.co/sfx/preview/mixkit-winning-chimes-2015.mp3"),
    next: new Audio("https://assets.mixkit.co/sfx/preview/mixkit-unlock-game-notification-253.mp3"),
    score: new Audio("https://assets.mixkit.co/sfx/preview/mixkit-animated-small-group-applause-523.mp3")
};


let user, room, isH = false, currentPlayers = [];

async function start(hostMode) {
    user = nameInp.value.trim();
    room = roomInp.value.trim().toUpperCase();
    if(!user || room !== "GV26") return alert("Falsch!");
    if(hostMode) {
        isH = true;
        await update(ref(db, `rooms/${room}/state`), { host: user, phase: "lobby", qIdx: -1, gameQs: baseQuestions.sort(() => Math.random() - 0.5) });
    }
    await set(ref(db, `rooms/${room}/players/${user}`), 0);
    loginSection.style.display = "none";
    gameSection.style.display = "block";
    if(isH) hostControls.style.display = "block";
    sync();
}

function sync() {
    onValue(ref(db, `rooms/${room}/state`), async snap => {
        const d = snap.val(); if(!d) return;
        inputArea.style.display = "none"; voteArea.style.display = "none"; bigScoreArea.style.display = "none";
        resBanner.style.display = (d.phase === "score" && d.lastResult) ? "block" : "none";

        if(d.phase === "answer") {
            qDisplay.innerText = d.gameQs[d.qIdx];
            if(!waitMsg.innerText.includes("✅")) { setupInput(d.gameQs[d.qIdx]); inputArea.style.display = "block"; }
        } else if(d.phase === "vote") {
            qDisplay.innerText = "Abstimmen!";
            voteArea.style.display = "block";
            loadVotes();
        } else if(d.phase === "score") {
            qDisplay.innerText = "Rundenergebnis";
            bigScoreArea.style.display = "block";
            showRoundFeedback(d.lastResult);
        }
    });

    onValue(ref(db, `rooms/${room}/votes`), snap => {
        if(isH) {
            const votes = snap.val() || {};
            btnEvaluate.innerText = `Auswerten (${Object.keys(votes).length} Stimmen)`;
        }
    });

    onValue(ref(db, `rooms/${room}/players`), snap => {
        const p = snap.val() || {}; currentPlayers = Object.keys(p);
        liveScoreList.innerText = "Dabei: " + currentPlayers.join(", ");
    });
}

async function setupInput(q) {
    const area = document.getElementById("dynamicInput");
    if(q.toLowerCase().startsWith("wer")) {
        area.innerHTML = `<select id="ansInp">${currentPlayers.map(p=>`<option value="${p}">${p}</option>`).join("")}</select>`;
    } else { area.innerHTML = `<input id="ansInp" placeholder="Deine Antwort...">`; }
}

async function loadVotes() {
    const ansSnap = await get(ref(db, `rooms/${room}/answers`));
    const answers = ansSnap.val() || {};
    const unique = [...new Set(Object.values(answers))];
    voteArea.innerHTML = "";
    unique.forEach(txt => {
        const b = document.createElement("button");
        b.className = "vote-btn"; b.innerText = txt;
        b.onclick = async () => {
            await set(ref(db, `rooms/${room}/votes/${user}`), txt);
            voteArea.innerHTML = "<p>Stimme abgegeben! Warten auf Host...</p>";
        };
        voteArea.appendChild(b);
    });
}

async function evaluateRound() {
    const ansSnap = await get(ref(db, `rooms/${room}/answers`));
    const voteSnap = await get(ref(db, `rooms/${room}/votes`));
    const answers = ansSnap.val() || {};
    const votes = voteSnap.val() || {};
    
    let counts = {};
    Object.values(votes).forEach(v => counts[v] = (counts[v] || 0) + 1);
    const max = Math.max(...Object.values(counts), 0);
    const winners = Object.keys(counts).filter(k => counts[k] === max);

    const pSnap = await get(ref(db, `rooms/${room}/players`));
    let players = pSnap.val() || {};
    let scorers = [];

    Object.entries(answers).forEach(([name, ans]) => {
        if(winners.includes(ans)) { players[name] += 1; scorers.push(name); }
    });

    await set(ref(db, `rooms/${room}/players`), players);
    await set(ref(db, `rooms/${room}/votes`), {});
    update(ref(db, `rooms/${room}/state`), { phase: "score", lastResult: { winners, scorers } });
}

function showRoundFeedback(res) {
    if(!res) return;
    winName.innerText = res.winners.join(", ");
    const gotP = res.scorers.includes(user);
    personalFeedback.innerText = gotP ? "🎯 Punkt für dich!" : "❌ Kein Punkt.";
    personalFeedback.style.color = gotP ? "var(--green)" : "white";

    get(ref(db, `rooms/${room}/players`)).then(snap => {
        const p = snap.val() || {};
        const sorted = Object.entries(p).sort((a,b) => b[1] - a[1]);
        bigScoreArea.innerHTML = sorted.map(([n, s]) => `
            <div class="score-item">
                <span>${n} ${res.scorers.includes(n) ? '<span class="plus-badge">+1</span>' : ''}</span>
                <strong>${s} Pkt.</strong>
            </div>`).join("");
    });
}

btnNext.onclick = () => {
    set(ref(db, `rooms/${room}/answers`), {});
    waitMsg.innerText = "";
    get(ref(db, `rooms/${room}/state`)).then(snap => {
        const s = snap.val();
        update(ref(db, `rooms/${room}/state`), { phase: "answer", qIdx: s.qIdx + 1, lastResult: null });
    });
};
btnEvaluate.onclick = () => {
    get(ref(db, `rooms/${room}/state`)).then(snap => {
        if(snap.val().phase === "answer") update(ref(db, `rooms/${room}/state`), { phase: "vote" });
        else evaluateRound();
    });
};
btnSend.onclick = () => {
    const v = document.getElementById("ansInp").value;
    set(ref(db, `rooms/${room}/answers/${user}`), v);
    inputArea.style.display = "none"; waitMsg.innerText = "✅ Gesendet!";
};
btnScore.onclick = () => update(ref(db, `rooms/${room}/state`), { phase: "score" });
btnReset.onclick = () => remove(ref(db, `rooms/${room}`)).then(()=>location.reload());
btnPlayer.onclick = () => start(false);
btnHost.onclick = () => start(true);
</script>
</body>
</html>
